{% extends "base.html" %}

{% block content %}

<h1> Search </h1>

<form method="get" action="/filter">

    <!-- keyword -->
    <input type="text" name="keyword" placeholder="Enter the keyword">

    <!-- category -->
    <select name="category">
        <option value="" disabled selected>Category</option>

        <option value="Automotive">Automotive</option>
        <option value="Baby Care">Baby Care</option>
        <option value="Bags, Wallets & Belts">Bags, Wallets & Belts</option>
        <option value="Beauty and Personal Care">Beauty and Personal Care</option>
        <option value="Clothing">Clothing</option>
        <option value="Computers">Computers</option>
        <option value="Footwear">Footwear</option>
        <option value="Furniture">Furniture</option>
        <option value="Home Decor & Festive Needs">Home Decor & Festive Needs</option>
        <option value="Home Furnishing">Home Furnishing</option>
        <option value="Jewellery">Jewellery</option>
        <option value="Kitchen & Dining">Kitchen & Dining</option>
        <option value="Mobiles & Accessories">Mobiles & Accessories</option>
        <option value="Pens & Stationery">Pens & Stationery</option>
        <option value="Sports & Fitness">Sports & Fitness</option>
        <option value="Tools & Hardware">Tools & Hardware</option>
        <option value="Toys & School Supplies">Toys & School Supplies</option>
        <option value="Watches">Watches</option>

    </select>

    <!-- squence-->
    <select name="sequence">
        <option value="" disabled selected>Filter</option>
        <option value="PriceL2H">Price Low to High</option>
        <option value="PriceH2L">Price High to Low</option>
        <option value="LikesH2L">Most Liked</option>
        <option value="MostRecent">Recently Posted</option>
    </select>

    <!-- min price -->
    <input type="number" name="min_price" placeholder="Min price">

    <!-- max price -->
    <input type="number" name="max_price" placeholder="Max price">

    <!-- condition -->
    <p>Condition:</p>

    <label>
        <input type="checkbox" name="condition" value="Brand New">
        Brand New
    </label><br>

    <label>
        <input type="checkbox" name="condition" value="Like New">
        Like New
    </label><br>

    <label>
        <input type="checkbox" name="condition" value="Minor Scratches or Stains">
        Minor Scratches or Stain
    </label><br>

    <label>
        <input type="checkbox" name="condition" value="Visible Scratches or Stains">
        Visible Scratches or Stains
    </label><br>

    <label>
        <input type="checkbox" name="condition" value="Poor Condition">
        Poor Condition
    </label><br>

    <button type="submit">Search</button>

</form>

<hr>

<h2>Results</h2>

<div class="product-grid">
    {% for item in items %}
    <div class="product_card">

        <a href="/item/{{ item[0] }}">
            <img src="{{ item[4] }}" class="product-img-index">
        </a>

        <h3>{{ item[1] }}</h3>

        <p class="font">Price: ${{ item[3] }}</p>

    </div>
    {% endfor %}
</div>

{% endblock %}
