{% extends "base.html" %}

{% block content %}

<h1>All Items</h1>

<div class="product-grid">
    {% for item in items %}
    <div class="product_card">

        <a href="/item/{{ item[0] }}">
            <img src="{{ item[4] }}" class="product-img-index">
        </a>

        <h3>{{ item[1] }}</h3>

        <p class="font">Price: ${{ item[3] }}</p>

    </div>
    {% endfor %}
</div>
{% endblock %}
